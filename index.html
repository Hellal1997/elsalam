<title>موقف السلام</title>

<style>
  body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
  }

  header {
    background: #1e293b;
    padding: 20px;
  }

  h1 {
    margin: 0;
    color: #38bdf8;
  }

  p {
    color: #cbd5f5;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
  }

  .gallery img {
    width: 100%;
    height: 250px;
    object-fit: cover;
    border-radius: 12px;
    transition: 0.3s;
  }

  .gallery img:hover {
    transform: scale(1.05);
  }

  .location {
    padding: 20px;
  }

  iframe {
    width: 100%;
    height: 300px;
    border: 0;
    border-radius: 12px;
  }

  .btn {
    display: inline-block;
    margin-top: 15px;
    padding: 10px 15px;
    background: #38bdf8;
    color: black;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
  }

  footer {
    padding: 15px;
    background: #1e293b;
  }
</style>
</head>
